name: verify

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - run: python -m py_compile "server main.py" olp_client.py wire_openline_demo.py
      - run: python tests/server_runtime_smoke.py
      - run: npm test
      - run: PYTHON=python npm run check
